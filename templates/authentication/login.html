{% extends 'base.html' %}
{% block title %}Iniciar Sesión - Clínica Santa Rosa{% endblock %}

{% block content %}
<div style="max-width: 420px; margin: 3rem auto;">
    <div class="card" style="text-align: center;">
        <div style="font-size: 2.5rem; margin-bottom: 0.5rem;">+</div>
        <h2 style="justify-content: center;">Iniciar Sesión</h2>
        <p style="color: var(--gray-500); font-size: 0.9rem; margin-bottom: 1.5rem;">
            Sistema de Gestión de Turnos
        </p>
        <form method="post" style="text-align: left;">
            {% csrf_token %}
            <div class="field">
                <label>Usuario</label>
                <input type="text" name="username" required autofocus placeholder="Ingresá tu usuario">
            </div>
            <div class="field">
                <label>Contraseña</label>
                <input type="password" name="password" required placeholder="Ingresá tu contraseña">
            </div>
            {% if form.errors %}
            <p style="color: var(--danger); font-size: 0.85rem; margin-bottom: 1rem;">
                Usuario o contraseña incorrectos.
            </p>
            {% endif %}
            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 0.75rem;">
                Ingresar
            </button>
        </form>
        <p style="margin-top: 1.2rem; font-size: 0.88rem; color: var(--gray-500);">
            ¿No tenés cuenta? <a href="{% url 'registro' %}" style="color: var(--primary-light); font-weight: 600;">Registrate</a>
        </p>
    </div>
</div>
{% endblock %}
